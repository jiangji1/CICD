# GitHub Actions CI/CD 配置文件
# 实现代码提交后自动安装依赖、打包并部署到 GitHub Pages

name: Deploy to GitHub Pages

# 触发条件：当代码推送到 master 分支时触发
on:
  push:
    branches:
      - master

# 工作流任务
jobs:
  # 构建和部署任务
  deploy:
    # 运行环境：使用最新的 Ubuntu 环境
    runs-on: ubuntu-latest
    
    steps:
      # 步骤 1：检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 确保获取完整的 Git 历史，以便后续操作
          fetch-depth: 0
      
      # 步骤 2：设置 Node.js 环境
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # 指定 Node.js 版本
          node-version: 'v24.13.1'
          # 缓存 npm 依赖，加速安装
          cache: 'npm'
      
      # 步骤 3：安装依赖
      - name: Install dependencies
        run: npm install
      
      # 步骤 3.5：代码质量检查
      - name: Run lint
        run: npm run lint 
      
      # 步骤 4：构建项目
      - name: Build project
        run: npm run build
      
      # 步骤 5：部署到 master 分支
      - name: Deploy to master branch
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout --orphan deploy-temp
          git rm -rf .
          cp -r dist/* .
          git add .
          git commit -m "Deploy to GitHub Pages"
          git push origin deploy-temp:master --force
