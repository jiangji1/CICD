# GitHub Actions CI/CD 配置文件
# 实现代码提交后自动安装依赖、打包并部署到 GitHub Pages

name: Deploy to GitHub Pages

# 触发条件：当代码推送到 master 分支时触发
on:
  push:
    branches:
      - master

# 工作流任务
jobs:
  # 构建和部署任务
  deploy:
    # 运行环境：使用最新的 Ubuntu 环境
    runs-on: ubuntu-latest
    
    steps:
      # 步骤 1：检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 确保获取完整的 Git 历史，以便后续操作
          fetch-depth: 0
      
      # 步骤 2：设置 Node.js 环境
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # 指定 Node.js 版本
          node-version: 'v24.13.1'
          # 缓存 npm 依赖，加速安装
          cache: 'npm'
      
      # 步骤 3：安装依赖
      - name: Install dependencies
        run: npm install
      
      # 步骤 3.5：代码质量检查
      - name: Run lint
        run: npm run lint 
      
      # 步骤 4：构建项目
      - name: Build project
        run: npm run build
      
      # 步骤 5：部署到 gh-pages 分支
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          # GitHub Token，用于认证和推送代码
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 要发布的目录，即构建后的 dist 目录
          publish_dir: ./dist
          # 目标目录，./ 表示部署到 gh-pages 分支的根目录
          destination_dir: ./
          # 是否保留现有文件，false 表示覆盖所有文件
          keep_files: false
          # 提交信息
          commit_message: 'Deploy from GitHub Actions'
          # 是否强制创建孤立分支，保持 gh-pages 分支历史简洁
          force_orphan: true
          # Git 用户名，用于提交
          user_name: 'github-actions[bot]'
          # Git 用户邮箱，用于提交
          user_email: 'github-actions[bot]@users.noreply.github.com'
